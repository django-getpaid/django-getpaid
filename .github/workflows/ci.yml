name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install unit dependencies
        run: uv sync --frozen

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check unswapped getpaid migrations
        env:
          DJANGO_SETTINGS_MODULE: tests.settings_default_payment
          PYTHONPATH: .
        run: uv run python manage.py makemigrations --check --dry-run getpaid

      - name: Run unit tests
        run: make test-unit

  integration:
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Run Docker-backed integration tests
        run: make test-integration
