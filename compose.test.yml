services:
  testdb:
    image: postgres:16
    environment:
      POSTGRES_DB: test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - test-net

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      testdb:
        condition: service_healthy
    environment:
      TEST_DATABASE_URL: postgres://test_user:test_password@testdb:5432/test_db
      DJANGO_SETTINGS_MODULE: tests.settings
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
